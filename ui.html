<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Agent Research Pipeline</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    .chip { padding: 6px 13px; border-radius: 20px; border: 1px solid #2a2a2a; background: #1a1a1a; color: #888; font-size: 0.78rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .chip:hover { border-color: #6366f1; color: #6366f1; background: #6366f110; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 6px; background: linear-gradient(90deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #555; margin-bottom: 36px; font-size: 0.9rem; }
    .search-box { display: flex; gap: 10px; margin-bottom: 28px; }
    .search-box input[type=text] { flex: 1; padding: 13px 16px; border-radius: 8px; border: 1px solid #2a2a2a; background: #1a1a1a; color: #e0e0e0; font-size: 0.95rem; outline: none; transition: border 0.2s; }
    .search-box input[type=text]:focus { border-color: #6366f1; }
    .btn-primary { padding: 13px 26px; border-radius: 8px; border: none; background: linear-gradient(90deg, #6366f1, #8b5cf6); color: white; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-secondary { padding: 7px 14px; border-radius: 6px; border: 1px solid #2a2a2a; background: transparent; color: #aaa; font-size: 0.8rem; cursor: pointer; transition: background 0.15s, color 0.15s; }
    .btn-secondary:hover { background: #2a2a2a; color: #e0e0e0; }
    .btn-download { padding: 7px 14px; border-radius: 6px; border: none; background: #6366f1; color: white; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-download:hover { opacity: 0.85; }
    .status { padding: 13px 18px; border-radius: 8px; background: #1a1a1a; border: 1px solid #2a2a2a; margin-bottom: 22px; display: none; align-items: flex-start; gap: 10px; font-size: 0.88rem; }
    .status .status-body { flex: 1; min-width: 0; }
    .status .status-steps { margin-top: 8px; font-size: 0.78rem; color: #555; line-height: 1.5; max-height: 120px; overflow-y: auto; }
    .status .status-steps div { color: #777; }
    .status .status-steps div:last-child { color: #aaa; }
    .status.running { display: flex; border-color: #6366f1; color: #aaa; }
    .status.done { display: flex; border-color: #22c55e; color: #aaa; }
    .status.error { display: flex; border-color: #ef4444; color: #f87171; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #22c55e; }
    .dot.purple { background: #6366f1; animation: pulse 1.2s infinite; }
    .dot.red { background: #ef4444; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .scores { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 18px; }
    .score-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px; text-align: center; }
    .score-card.overall { border-color: #6366f133; }
    .score-card .value { font-size: 1.6rem; font-weight: 600; color: #6366f1; }
    .score-card .label { font-size: 0.7rem; color: #555; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
    .meta-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
    .meta-item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 7px 13px; font-size: 0.82rem; color: #666; }
    .meta-item span { color: #e0e0e0; font-weight: 500; }
    .meta-item span.green { color: #22c55e; }
    .meta-item span.bad { color: #f87171; }
    .meta-actions { margin-left: auto; display: flex; gap: 8px; }
    .feedback { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px 18px; margin-bottom: 18px; display: none; }
    .feedback .label { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .feedback p { color: #888; font-size: 0.85rem; line-height: 1.6; }
    .report-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 28px; display: none; margin-bottom: 28px; max-width: 100%; overflow-x: auto; overflow-wrap: break-word; word-break: normal; }
    .report-box h1 { font-size: 1.4rem; margin-bottom: 14px; background: none; -webkit-text-fill-color: #e0e0e0; }
    .report-box h2 { font-size: 1.05rem; color: #6366f1; margin: 22px 0 10px; }
    .report-box p { color: #bbb; font-size: 0.9rem; line-height: 1.75; margin-bottom: 12px; overflow-wrap: break-word; word-break: normal; }
    .report-box ul, .report-box ol { color: #bbb; font-size: 0.9rem; padding-left: 22px; margin-bottom: 12px; }
    .report-box li { margin-bottom: 5px; line-height: 1.65; overflow-wrap: break-word; word-break: normal; }
    /* Long bare URLs may still need soft breaks; keep normal word-breaking for titles/authors in the same line */
    .report-box a { color: #818cf8; overflow-wrap: anywhere; word-break: normal; }
    .report-box pre { overflow-x: auto; max-width: 100%; }
    .prev-section { display: none; border-top: 1px solid #1e1e1e; padding-top: 22px; margin-top: 8px; }
    .prev-label { font-size: 0.72rem; color: #444; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .prev-list { display: flex; flex-direction: column; gap: 8px; }
    .prev-item { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 10px 14px; }
    .prev-item-main { display: flex; flex-direction: column; gap: 4px; min-width: 0; flex: 1; }
    .prev-item-title { font-size: 0.85rem; color: #888; word-break: break-word; }
    .prev-item-time { font-size: 0.72rem; color: #555; }
    .prev-item-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
    .report-modal { display: none; position: fixed; inset: 0; z-index: 1000; padding: 24px 16px; overflow-y: auto; }
    .report-modal.open { display: block; }
    .report-modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.72); z-index: 0; }
    .report-modal-panel { position: relative; z-index: 1; width: 100%; max-width: 820px; margin: 24px auto 40px; background: #141414; border: 1px solid #2a2a2a; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-height: calc(100vh - 48px); display: flex; flex-direction: column; }
    .report-modal-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 18px; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; }
    .report-modal-header span { font-size: 0.82rem; color: #888; word-break: break-all; }
    /* .report-box defaults to display:none for the main report slot; modal must override */
    .report-modal-body.report-box { display: block !important; margin-bottom: 0; padding: 20px 22px 28px; }
    .report-modal-body { overflow-y: auto; color: #bbb; font-size: 0.9rem; line-height: 1.65; }
    .report-modal-body h1 { font-size: 1.25rem; margin-bottom: 12px; background: none !important; -webkit-background-clip: unset !important; -webkit-text-fill-color: #e0e0e0 !important; color: #e0e0e0 !important; }
    .report-modal-body h2 { font-size: 1rem; color: #818cf8; margin: 18px 0 8px; }
    .copy-toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border: 1px solid #2a2a2a; color: #aaa; font-size: 0.82rem; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .copy-toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="container">
  <h1>Multi-Agent Research Pipeline</h1>
  <p class="subtitle">Type any research question below and the pipeline will search the web, analyse findings, write a structured report, and score it — automatically.</p>

  <div class="search-box">
    <input type="text" id="query" placeholder="Ask anything... e.g. What are the latest AI breakthroughs in 2025?" />
    <button class="btn-primary" id="btn" onclick="runResearch()">Research</button>
  </div>
  <div style="display:flex; flex-wrap:wrap; align-items:center; gap:14px; margin-bottom:14px;">
    <label style="font-size:0.82rem; color:#888;">Report format
      <select id="reportFormat" style="margin-left:6px; padding:7px 12px; border-radius:6px; border:1px solid #2a2a2a; background:#1a1a1a; color:#ccc; font-size:0.85rem;">
        <option value="markdown">Markdown sections</option>
        <option value="bullets">Bullet-led</option>
        <option value="executive_only">Executive summary only</option>
        <option value="full_detailed">Full detailed</option>
      </select>
    </label>
  </div>
  <div id="historyWrap" style="display:none; margin-bottom:18px;">
    <span style="font-size:0.75rem; color:#444; margin-right:8px;">Recent:</span>
    <span id="historyChips" style="display:inline-flex; flex-wrap:wrap; gap:8px; vertical-align:middle;"></span>
  </div>

  <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:22px;" id="chips">
    <span style="font-size:0.75rem; color:#444; align-self:center; margin-right:2px;">Try:</span>
    <button class="chip" onclick="fillQuery('What are the latest AI breakthroughs in 2025?')">AI breakthroughs 2025</button>
    <button class="chip" onclick="fillQuery('How does quantum computing work?')">How quantum computing works</button>
    <button class="chip" onclick="fillQuery('Latest developments in renewable energy 2025')">Renewable energy trends</button>
    <button class="chip" onclick="fillQuery('What is the future of electric vehicles?')">Future of electric vehicles</button>
    <button class="chip" onclick="fillQuery('How does the human immune system work?')">Human immune system</button>
  </div>

  <div class="status" id="status"></div>
  <div class="scores" id="scores" style="display:none;"></div>
  <div class="meta-row" id="meta" style="display:none;"></div>
  <div class="feedback" id="feedback"></div>
  <div class="report-box" id="report"></div>

  <div class="prev-section" id="prevSection">
    <div class="prev-label">Previous reports</div>
    <div class="prev-list" id="prevList"></div>
  </div>
</div>

<div class="report-modal" id="prevReportModal" aria-hidden="true">
  <div class="report-modal-backdrop" id="prevReportModalBackdrop"></div>
  <div class="report-modal-panel">
    <div class="report-modal-header">
      <span id="prevReportModalTitle"></span>
      <button type="button" class="btn-secondary" id="prevReportModalClose">Close</button>
    </div>
    <div class="report-modal-body report-box" id="prevReportModalBody"></div>
  </div>
</div>

<div class="copy-toast" id="toast">Copied to clipboard</div>

<script>
  const API = '';
  const LS_HISTORY = 'marp_recent_research';
  const AGENT_LABELS = {
    search_agent: 'Search',
    analysis_agent: 'Analysis',
    writer_agent: 'Writer',
    critic_agent: 'Critic',
    evaluator: 'Evaluator',
  };
  let currentFilename = '';
  let currentReport = '';

  function formatAgentSteps(agentSteps) {
    if (!agentSteps || !agentSteps.length) return '';
    return agentSteps
      .map(function (s) {
        var lab = AGENT_LABELS[s.agent] || s.agent;
        var sec = s.seconds != null ? s.seconds : '?';
        return lab + ': ' + sec + 's';
      })
      .join(' · ');
  }

  function pushRecentRun(entry) {
    try {
      var raw = localStorage.getItem(LS_HISTORY);
      var arr = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(arr)) arr = [];
      var key = JSON.stringify({
        q: entry.query,
        f: entry.report_format || 'markdown',
      });
      arr = arr.filter(function (x) {
        return JSON.stringify({ q: x.query, f: x.report_format || 'markdown' }) !== key;
      });
      arr.unshift({
        query: entry.query,
        report_format: entry.report_format || 'markdown',
        at: Date.now(),
      });
      arr = arr.slice(0, 5);
      localStorage.setItem(LS_HISTORY, JSON.stringify(arr));
    } catch (e) {}
    renderHistoryChips();
  }

  function renderHistoryChips() {
    var wrap = document.getElementById('historyWrap');
    var el = document.getElementById('historyChips');
    if (!wrap || !el) return;
    var arr = [];
    try {
      arr = JSON.parse(localStorage.getItem(LS_HISTORY) || '[]');
    } catch (e) {}
    if (!Array.isArray(arr) || !arr.length) {
      wrap.style.display = 'none';
      el.innerHTML = '';
      return;
    }
    wrap.style.display = 'block';
    el.innerHTML = '';
    arr.forEach(function (it) {
      var q = it.query || '';
      var short = q.length > 56 ? q.slice(0, 56) + '…' : q;
      var b = document.createElement('button');
      b.type = 'button';
      b.className = 'chip history-chip';
      b.textContent = short || '(empty)';
      b.addEventListener('click', function () {
        document.getElementById('query').value = it.query || '';
        var rf = document.getElementById('reportFormat');
        if (rf) rf.value = it.report_format || 'markdown';
        runResearch();
      });
      el.appendChild(b);
    });
  }

  document.getElementById('query').addEventListener('keydown', e => {
    if (e.key === 'Enter') runResearch();
  });

  function setStatus(msg, type, stepsHtml) {
    const el = document.getElementById('status');
    const dots = { running: 'purple', done: 'green', error: 'red' };
    el.className = 'status ' + type;
    const steps = stepsHtml
      ? '<div class="status-steps">' + stepsHtml + '</div>'
      : '';
    el.innerHTML =
      '<div class="dot ' + dots[type] + '"></div>' +
      '<div class="status-body">' + msg + steps + '</div>';
  }

  function httpErrorDetail(status, bodyText) {
    try {
      const j = JSON.parse(bodyText);
      if (j && typeof j.detail === 'string') return j.detail;
    } catch (_) {}
    return bodyText || ('HTTP ' + status);
  }

  function parseSseDataBlock(raw) {
    for (const line of raw.split('\n')) {
      const t = line.trim();
      if (t.startsWith('data:')) {
        try {
          return JSON.parse(t.slice(5).trim());
        } catch (e) {
          return null;
        }
      }
    }
    return null;
  }

  function pipelineReportFailed(report) {
    if (!report || typeof report !== 'string') return false;
    var t = report.trim().toLowerCase();
    return t.indexOf('report generation failed:') === 0 || t.indexOf('analysis failed:') === 0;
  }

  function renderResearchResult(data) {
    currentFilename = data.filename || '';
    currentReport = data.report;

    var failed = pipelineReportFailed(data.report);
    if (failed) {
      setStatus('Report failed to generate.', 'error');
    } else {
      setStatus(
        data.approved ? 'Report generated and approved.' : 'Report generated.',
        'done'
      );
    }

    const scoreKeys = ['relevance', 'completeness', 'clarity', 'structure', 'overall'];
    const scoresEl = document.getElementById('scores');
    if (failed) {
      scoresEl.style.display = 'none';
      scoresEl.innerHTML = '';
    } else {
      scoresEl.style.display = 'grid';
      scoresEl.innerHTML = scoreKeys.map(
        k =>
          '<div class="score-card' + (k === 'overall' ? ' overall' : '') + '">' +
          '<div class="value">' + (data.scores[k] ?? '?') + '</div>' +
          '<div class="label">' + k + '</div>' +
          '</div>'
      ).join('');
    }

    const metaEl = document.getElementById('meta');
    metaEl.style.display = 'flex';
    var approvedCls = failed ? 'bad' : data.approved ? 'green' : 'bad';
    var approvedLabel = failed ? 'No' : data.approved ? 'Yes' : 'No';
    var downloadBtn =
      currentFilename && !failed
        ? '<button class="btn-download" onclick="downloadReport(currentFilename, currentReport)">Download .md</button>'
        : '';
    var timingStr = formatAgentSteps(data.agent_steps);
    var timingHtml = timingStr
      ? '<div class="meta-item" style="flex-basis:100%;"><span style="color:#888;">Step times</span> · <span>' +
        timingStr.replace(/&/g, '&amp;').replace(/</g, '&lt;') +
        '</span></div>'
      : '';
    metaEl.innerHTML =
      '<div class="meta-item">Duration: <span>' + data.duration_seconds + 's</span></div>' +
      '<div class="meta-item">Revisions: <span>' + data.revisions + '</span></div>' +
      '<div class="meta-item">Approved: <span class="' +
      approvedCls +
      '">' +
      approvedLabel +
      '</span></div>' +
      '<div class="meta-actions">' +
      '<button class="btn-secondary" onclick="copyReport()">Copy</button>' +
      downloadBtn +
      '</div>' +
      timingHtml;

    const fb = document.getElementById('feedback');
    if (failed && data.scores && data.scores.feedback) {
      fb.style.display = 'block';
      fb.innerHTML = '<div class="label">Note</div><p>' + data.scores.feedback + '</p>';
    } else if (!failed && data.scores && data.scores.feedback) {
      fb.style.display = 'block';
      fb.innerHTML = '<div class="label">Evaluator feedback</div><p>' + data.scores.feedback + '</p>';
    } else {
      fb.style.display = 'none';
      fb.innerHTML = '';
    }

    const reportEl = document.getElementById('report');
    reportEl.style.display = 'block';
    reportEl.innerHTML = marked.parse(data.report);

    if (!failed) {
      pushRecentRun({
        query: data.query || document.getElementById('query').value.trim(),
        report_format: data.report_format || document.getElementById('reportFormat').value,
      });
    }

    loadPreviousReports();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function downloadReport(filename, content) {
    const blob = new Blob([content], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function escapeAttr(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  async function loadPreviousReports() {
    try {
      const res = await fetch(API + '/reports');
      const data = await res.json();
      const reports = data.reports || [];
      if (!reports.length) return;
      const section = document.getElementById('prevSection');
      const list = document.getElementById('prevList');
      section.style.display = 'block';
      list.innerHTML = reports.slice(0, 10).map(function (item) {
        var row = typeof item === 'string' ? { filename: item, generated_at: '' } : item;
        var fn = row.filename || '';
        var ts = row.generated_at || '';
        var label = fn.replace(/\.md$/i, '');
        return (
          '<div class="prev-item">' +
          '<div class="prev-item-main">' +
          '<span class="prev-item-title">' +
          label.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') +
          '</span>' +
          (ts
            ? '<span class="prev-item-time">' +
              ts.replace(/&/g, '&amp;').replace(/</g, '&lt;') +
              '</span>'
            : '') +
          '</div>' +
          '<div class="prev-item-actions">' +
          '<button type="button" class="btn-secondary prev-view" data-filename="' +
          escapeAttr(fn) +
          '">View</button>' +
          '<button type="button" class="btn-secondary prev-dl" data-filename="' +
          escapeAttr(fn) +
          '">Download</button>' +
          '</div>' +
          '</div>'
        );
      }).join('');
      list.querySelectorAll('.prev-view').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var f = btn.getAttribute('data-filename');
          if (f) viewPreviousReport(f);
        });
      });
      list.querySelectorAll('.prev-dl').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var f = btn.getAttribute('data-filename');
          if (f) fetchAndDownload(f);
        });
      });
    } catch(e) {}
  }

  function closePreviousReportModal() {
    const m = document.getElementById('prevReportModal');
    m.classList.remove('open');
    m.setAttribute('aria-hidden', 'true');
    document.getElementById('prevReportModalBody').innerHTML = '';
  }

  async function viewPreviousReport(filename) {
    try {
      const res = await fetch(API + '/reports/' + encodeURIComponent(filename));
      if (!res.ok) throw new Error(httpErrorDetail(res.status, await res.text()));
      const data = await res.json();
      document.getElementById('prevReportModalTitle').textContent = data.filename || filename;
      document.getElementById('prevReportModalBody').innerHTML = marked.parse(data.content || '');
      const m = document.getElementById('prevReportModal');
      m.classList.add('open');
      m.setAttribute('aria-hidden', 'false');
    } catch (e) {
      showToast('Could not open report');
    }
  }

  document.getElementById('prevReportModalClose').addEventListener('click', closePreviousReportModal);
  document.getElementById('prevReportModalBackdrop').addEventListener('click', closePreviousReportModal);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && document.getElementById('prevReportModal').classList.contains('open')) {
      closePreviousReportModal();
    }
  });

  async function fetchAndDownload(filename) {
    try {
      const res = await fetch(API + '/reports/' + encodeURIComponent(filename));
      const data = await res.json();
      downloadReport(filename, data.content);
    } catch(e) {
      showToast('Download failed');
    }
  }

  async function runResearch() {
    const query = document.getElementById('query').value.trim();
    if (!query) return;
    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Researching...';
    document.getElementById('scores').style.display = 'none';
    document.getElementById('meta').style.display = 'none';
    document.getElementById('report').style.display = 'none';
    document.getElementById('feedback').style.display = 'none';
    const stepLines = [];
    function appendStepLine(text) {
      stepLines.push(
        '<div>' +
          text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') +
          '</div>'
      );
      setStatus('<strong>Live progress</strong>', 'running', stepLines.join(''));
    }
    setStatus('<strong>Starting pipeline…</strong>', 'running');

    try {
      const res = await fetch(API + '/research/stream', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Accept: 'text/event-stream',
        },
        body: JSON.stringify({
          query,
          report_format: document.getElementById('reportFormat').value,
        }),
      });
      if (!res.ok) {
        const t = await res.text();
        throw new Error(httpErrorDetail(res.status, t));
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let gotComplete = false;

      function handleEvent(data) {
        if (!data || typeof data.type !== 'string') return;
        if (data.type === 'step') {
          appendStepLine(data.message || data.step || '');
        } else if (data.type === 'complete') {
          gotComplete = true;
          renderResearchResult(data);
        } else if (data.type === 'error') {
          throw new Error(data.detail || 'Research failed');
        }
      }

      while (true) {
        const { done, value } = await reader.read();
        buffer += decoder.decode(value || new Uint8Array(0), { stream: !done });
        let sep;
        while ((sep = buffer.indexOf('\n\n')) !== -1) {
          const raw = buffer.slice(0, sep);
          buffer = buffer.slice(sep + 2);
          const data = parseSseDataBlock(raw);
          handleEvent(data);
        }
        if (done) break;
      }
      if (buffer.trim()) {
        const data = parseSseDataBlock(buffer);
        handleEvent(data);
      }
      if (!gotComplete) throw new Error('Stream ended before the report was ready.');
    } catch(err) {
      setStatus('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Research';
    }
  }

  function fillQuery(text) {
    document.getElementById('query').value = text;
    document.getElementById('query').focus();
  }

  function copyReport() {
    navigator.clipboard.writeText(currentReport).then(() => showToast('Copied to clipboard'));
  }

  loadPreviousReports();
  renderHistoryChips();
</script>
</body>
</html>
