<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Multi-Agent Research Pipeline</title>
  <script src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; background: linear-gradient(90deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #666; margin-bottom: 40px; font-size: 0.95rem; }
    .search-box { display: flex; gap: 12px; margin-bottom: 32px; }
    input { flex: 1; padding: 14px 18px; border-radius: 10px; border: 1px solid #2a2a2a; background: #1a1a1a; color: #e0e0e0; font-size: 1rem; outline: none; transition: border 0.2s; }
    input:focus { border-color: #6366f1; }
    button { padding: 14px 28px; border-radius: 10px; border: none; background: linear-gradient(90deg, #6366f1, #8b5cf6); color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; white-space: nowrap; }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { padding: 16px 20px; border-radius: 10px; background: #1a1a1a; border: 1px solid #2a2a2a; margin-bottom: 24px; display: none; }
    .status.running { border-color: #6366f1; }
    .status.done { border-color: #22c55e; }
    .status.error { border-color: #ef4444; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #6366f1; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .scores { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .score-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 16px; text-align: center; }
    .score-card .value { font-size: 2rem; font-weight: 700; color: #6366f1; }
    .score-card .label { font-size: 0.75rem; color: #666; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .meta-item { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 8px 14px; font-size: 0.85rem; color: #888; }
    .meta-item span { color: #e0e0e0; font-weight: 600; }
    .report { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 32px; line-height: 1.7; display: none; }
    .report h1 { font-size: 1.6rem; margin-bottom: 16px; background: none; -webkit-text-fill-color: #e0e0e0; }
    .report h2 { font-size: 1.2rem; color: #6366f1; margin: 24px 0 12px; }
    .report p { color: #bbb; margin-bottom: 12px; }
    .report ul, .report ol { color: #bbb; padding-left: 24px; margin-bottom: 12px; }
    .report li { margin-bottom: 6px; }
    .feedback { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 16px 20px; margin-bottom: 24px; display: none; }
    .feedback .label { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .feedback p { color: #bbb; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class='container'>
    <h1>Multi-Agent Research Pipeline</h1>
    <p class='subtitle'>Powered by LangGraph + Groq + DuckDuckGo — fully autonomous research</p>
    <div class='search-box'>
      <input type='text' id='query' placeholder='Ask anything... e.g. What are the latest AI breakthroughs in 2025?' />
      <button id='btn' onclick='runResearch()'>Research</button>
    </div>
    <div class='status' id='status'></div>
    <div class='scores' id='scores'></div>
    <div class='meta' id='meta'></div>
    <div class='feedback' id='feedback'></div>
    <div class='report' id='report'></div>
  </div>
  <script>
    const input = document.getElementById('query');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') runResearch(); });

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.style.display = 'block';
      el.className = 'status ' + type;
      el.innerHTML = type === 'running' ? `<span class='spinner'></span>${msg}` : msg;
    }

    async function runResearch() {
      const query = document.getElementById('query').value.trim();
      if (!query) return;
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Researching...';
      document.getElementById('scores').innerHTML = '';
      document.getElementById('meta').innerHTML = '';
      document.getElementById('report').style.display = 'none';
      document.getElementById('feedback').style.display = 'none';
      setStatus('Pipeline running — searching, analyzing, writing, reviewing...', 'running');
      try {
        const res = await fetch('http://localhost:8000/research', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query })
        });
        if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        setStatus('Report generated and approved!', 'done');
        const scoreKeys = ['relevance', 'completeness', 'clarity', 'structure', 'overall'];
        document.getElementById('scores').innerHTML = scoreKeys.map(k =>
          `<div class='score-card'><div class='value'>${data.scores[k] ?? '?'}</div><div class='label'>${k}</div></div>`
        ).join('');
        document.getElementById('meta').innerHTML = [
          `<div class='meta-item'>Duration: <span>${data.duration_seconds}s</span></div>`,
          `<div class='meta-item'>Revisions: <span>${data.revisions}</span></div>`,
          `<div class='meta-item'>Approved: <span>${data.approved ? 'Yes' : 'No'}</span></div>`,
          `<div class='meta-item'>Saved: <span>${data.report_file}</span></div>`
        ].join('');
        if (data.scores.feedback) {
          const fb = document.getElementById('feedback');
          fb.style.display = 'block';
          fb.innerHTML = `<div class='label'>Evaluator Feedback</div><p>${data.scores.feedback}</p>`;
        }
        const reportEl = document.getElementById('report');
        reportEl.style.display = 'block';
        reportEl.innerHTML = marked.parse(data.report);
      } catch (err) {
        setStatus('Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Research';
      }
    }
  </script>
</body>
</html>
