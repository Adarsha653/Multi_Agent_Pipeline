# Fix #9 — run tests on every push / PR (no API keys required for current suite)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports (no Groq calls)
        run: |
          python -c "
          import agents.analysis_agent
          import agents.critic_agent
          import agents.search_agent
          import agents.supervisor
          import agents.writer_agent
          import api.main
          import eval.evaluator
          import graph.pipeline
          import graph.state
          import tools.search_tools
          import utils.agent_timing
          import utils.api_auth
          import utils.groq_llm
          import utils.report_outcome
          import utils.research_memory
          print('All imports OK')
          "

      - name: Run pytest
        run: python -m pytest tests/ -q --tb=short
